<!-- register_user.html -->
{% extends "base.html" %}
{% block content %}
<style>
	.auth-container {
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 70vh;
		padding: 2rem;
	}

	.auth-card {
		background: var(--white);
		border-radius: 24px;
		padding: 3rem 2.5rem;
		box-shadow: var(--shadow-xl);
		max-width: 460px;
		width: 100%;
		border: 1px solid rgba(10, 122, 255, 0.08);
		position: relative;
		overflow: hidden;
	}

	.auth-card::before {
		content: '';
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 4px;
		background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
	}

	.auth-icon {
		text-align: center;
		font-size: 4rem;
		margin-bottom: 1.5rem;
	}

	.auth-card h2 {
		font-family: 'Poppins', sans-serif;
		font-size: 2rem;
		font-weight: 800;
		text-align: center;
		margin-bottom: 2rem;
		background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
	}

	.info-note {
		background: var(--primary-light);
		border: 2px solid rgba(10, 122, 255, 0.2);
		padding: 1rem;
		border-radius: 12px;
		font-size: 0.9rem;
		color: var(--primary-dark);
		margin-bottom: 1.5rem;
		text-align: center;
		font-weight: 500;
	}

	.form-field {
		margin-bottom: 1.5rem;
	}

	.form-field label {
		display: block;
		margin-bottom: 0.5rem;
		font-weight: 600;
		color: var(--gray-900);
		font-size: 0.95rem;
	}

	input {
		width: 100%;
		padding: 0.875rem 1.25rem;
		border-radius: 12px;
		border: 2px solid var(--gray-300);
		font-family: inherit;
		font-size: 1rem;
		transition: all 0.3s;
	}

	input:focus {
		outline: none;
		border-color: var(--primary);
		box-shadow: 0 0 0 4px rgba(10, 122, 255, 0.1);
	}

	.auth-actions {
		margin-top: 2rem;
	}

	.auth-actions button {
		width: 100%;
		padding: 1rem;
		font-size: 1.125rem;
	}

	.auth-switch {
		margin-top: 1.5rem;
		text-align: center;
		color: var(--gray-700);
		font-size: 0.95rem;
	}

	.auth-switch a {
		color: var(--primary);
		font-weight: 600;
		text-decoration: none;
	}

	.auth-switch a:hover {
		text-decoration: underline;
	}

	@media (max-width: 640px) {
		.auth-card {
			padding: 2rem 1.5rem;
		}

		.auth-card h2 {
			font-size: 1.75rem;
		}
	}
</style>

<div class="auth-container">
	<div class="auth-card">
		<div class="auth-icon">✨</div>
		<h2>Create Account</h2>

		<div class="info-note">
			<strong>👑 Admin Privilege:</strong> First account created becomes Admin automatically
		</div>

		{% if error %}
		<div class="alert alert-error">
			{{ error }}
		</div>
		{% endif %}

		<form method="post" action="/auth/register">
			<div class="form-field">
				<label>Username</label>
				<input name="username" required placeholder="Choose a username" />
			</div>

			<div class="form-field">
				<label>Email Address</label>
				<input type="email" name="email" required placeholder="your.email@example.com" />
			</div>

			<div class="form-field">
				<label>Password</label>
				<input type="password" name="password" required placeholder="Create a secure password" />
			</div>

			<div class="auth-actions">
				<button type="submit" class="btn primary">Create Account</button>
			</div>

			<p class="auth-switch">
				Already have an account?
				<a href="/login">Sign in here</a>
			</p>
		</form>
	</div>
</div>
{% endblock %}
