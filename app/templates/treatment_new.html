{% extends "base.html" %}
{% block content %}
<style>
	.treatment-container {
		max-width: 900px;
		margin: 0 auto;
	}

	.page-header {
		text-align: center;
		background: var(--white);
		padding: 3rem 2rem;
		border-radius: 24px;
		box-shadow: var(--shadow-lg);
		margin-bottom: 3rem;
		border: 1px solid rgba(10, 122, 255, 0.08);
	}

	.page-header h2 {
		font-family: 'Poppins', sans-serif;
		font-size: 2.5rem;
		font-weight: 800;
		background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
		margin-bottom: 1rem;
	}

	.treatment-form {
		background: var(--white);
		border-radius: 24px;
		padding: 3rem;
		box-shadow: var(--shadow-lg);
		border: 1px solid rgba(10, 122, 255, 0.08);
	}

	.form-section {
		margin-bottom: 2rem;
	}

	.section-header {
		display: flex;
		align-items: center;
		gap: 0.75rem;
		margin-bottom: 1.5rem;
		padding-bottom: 1rem;
		border-bottom: 2px solid var(--gray-100);
	}

	.section-icon {
		font-size: 1.75rem;
	}

	.section-title {
		font-family: 'Poppins', sans-serif;
		font-size: 1.5rem;
		font-weight: 700;
		color: var(--gray-900);
	}

	.form-grid {
		display: grid;
		grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
		gap: 2rem;
	}

	.form-field {
		display: flex;
		flex-direction: column;
	}

	.form-field.full-width {
		grid-column: 1 / -1;
	}

	.form-field label {
		display: flex;
		align-items: center;
		gap: 0.5rem;
		margin-bottom: 0.75rem;
		font-weight: 600;
		color: var(--gray-900);
		font-size: 0.95rem;
	}

	input, textarea {
		width: 100%;
		padding: 0.875rem 1.25rem;
		border: 2px solid var(--gray-300);
		border-radius: 12px;
		font-size: 1rem;
		font-family: inherit;
		transition: all 0.3s;
		background: var(--white);
	}

	input:focus, textarea:focus {
		outline: none;
		border-color: var(--primary);
		box-shadow: 0 0 0 4px rgba(10, 122, 255, 0.1);
	}

	textarea {
		resize: vertical;
		min-height: 100px;
	}

	.submit-section {
		margin-top: 2rem;
		padding-top: 2rem;
		border-top: 2px solid var(--gray-100);
		display: flex;
		justify-content: center;
	}

	.submit-section button {
		padding: 1.25rem 3rem;
		font-size: 1.25rem;
		font-weight: 700;
		min-width: 300px;
	}

	@media (max-width: 768px) {
		.treatment-form {
			padding: 2rem;
		}
		.form-grid {
			grid-template-columns: 1fr;
		}
		.submit-section button {
			width: 100%;
			min-width: auto;
		}
	}
</style>

<div class="treatment-container">
	<div class="page-header">
		<h2>🏥 Start Treatment Plan</h2>
		<p style="color: var(--gray-700); font-size: 1.125rem; margin-top: 0.5rem;">
			Detected Condition: <strong>{{ checkup.predicted_label }}</strong>
		</p>
	</div>

	<form method="post" class="treatment-form">
		<input type="hidden" name="checkup_id" value="{{ checkup.id }}">

		<div class="form-section">
			<div class="section-header">
				<span class="section-icon">💊</span>
				<h3 class="section-title">Treatment Details</h3>
			</div>

			<div class="form-grid">
				<div class="form-field full-width">
					<label>Remedy Name</label>
					<input type="text" name="remedy_name" required placeholder="e.g., Aloe Vera Gel + Antifungal Cream" />
				</div>

				<div class="form-field">
					<label>Medicines</label>
					<textarea name="medicines" rows="3" placeholder="List prescribed medicines..."></textarea>
				</div>

				<div class="form-field">
					<label>Dosage Instructions</label>
					<input type="text" name="dosage" placeholder="e.g., Twice daily for 5 days" />
				</div>

				<div class="form-field full-width">
					<label>Doctor Notes</label>
					<textarea name="notes" rows="3" placeholder="Additional instructions and recommendations..."></textarea>
				</div>

				<div class="form-field">
					<label>Next Checkup Date</label>
					<input type="date" name="next_checkup_date" />
				</div>
			</div>
		</div>

		<div class="submit-section">
			<button type="submit" class="btn primary">💾 Save Treatment Plan</button>
		</div>
	</form>
</div>
{% endblock %}
