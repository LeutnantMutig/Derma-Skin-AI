<!-- patient_success.html -->
{% extends "base.html" %}
{% block content %}
<style>
	.success-container {
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 70vh;
		padding: 2rem;
	}

	.success-card {
		background: var(--white);
		border-radius: 32px;
		padding: 4rem 3rem;
		box-shadow: var(--shadow-xl);
		text-align: center;
		max-width: 600px;
		width: 100%;
		position: relative;
		overflow: hidden;
		border: 1px solid rgba(10, 122, 255, 0.08);
	}

	.success-card::before {
		content: '';
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 6px;
		background: linear-gradient(90deg, var(--success) 0%, #00A875 100%);
	}

	.success-animation {
		width: 140px;
		height: 140px;
		margin: 0 auto 2rem;
		border-radius: 50%;
		background: linear-gradient(135deg, #E6FAF5 0%, #D1F5EA 100%);
		border: 4px solid var(--success);
		display: flex;
		align-items: center;
		justify-content: center;
		animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
		position: relative;
	}

	@keyframes scaleIn {
		0% {
			transform: scale(0) rotate(-180deg);
			opacity: 0;
		}
		100% {
			transform: scale(1) rotate(0deg);
			opacity: 1;
		}
	}

	.success-animation::before {
		content: '';
		position: absolute;
		width: 160px;
		height: 160px;
		border-radius: 50%;
		border: 2px solid var(--success);
		opacity: 0.2;
		animation: pulse 2s ease-out infinite;
	}

	@keyframes pulse {
		0% {
			transform: scale(1);
			opacity: 0.2;
		}
		100% {
			transform: scale(1.3);
			opacity: 0;
		}
	}

	.checkmark {
		font-size: 5rem;
		color: var(--success);
	}

	.success-card h2 {
		font-family: 'Poppins', sans-serif;
		font-size: 2.5rem;
		font-weight: 800;
		background: linear-gradient(135deg, var(--success) 0%, #00A875 100%);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
		margin-bottom: 1.5rem;
	}

	.patient-name-display {
		font-size: 1.75rem;
		color: var(--primary);
		font-weight: 700;
		margin: 2rem 0;
		padding: 1.5rem;
		background: linear-gradient(135deg, var(--primary-light) 0%, rgba(10, 122, 255, 0.1) 100%);
		border-radius: 16px;
		border: 2px solid var(--primary);
	}

	.success-message {
		color: var(--gray-700);
		font-size: 1.25rem;
		margin-bottom: 2rem;
		line-height: 1.8;
	}

	.redirect-notice {
		padding: 1.5rem;
		background: var(--gray-100);
		border-radius: 16px;
		border: 2px solid var(--gray-300);
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 1rem;
	}

	.spinner {
		width: 28px;
		height: 28px;
		border: 4px solid var(--gray-300);
		border-top-color: var(--primary);
		border-radius: 50%;
		animation: spin 1s linear infinite;
	}

	@keyframes spin {
		to { transform: rotate(360deg); }
	}

	.redirect-text {
		font-weight: 600;
		color: var(--gray-900);
		font-size: 1.125rem;
	}

	@media (max-width: 640px) {
		.success-card {
			padding: 3rem 2rem;
		}

		.success-card h2 {
			font-size: 2rem;
		}

		.patient-name-display {
			font-size: 1.5rem;
		}
	}
</style>

<div class="success-container">
	<div class="success-card">
		<div class="success-animation">
			<span class="checkmark">✓</span>
		</div>
		
		<h2>Patient Registered!</h2>
		
		<div class="patient-name-display">
			{{ patient_name }}
		</div>
		
		<p class="success-message">
			Registration completed successfully. Patient record has been securely stored in the system.
		</p>

		<div class="redirect-notice">
			<div class="spinner"></div>
			<span class="redirect-text">Redirecting to home...</span>
		</div>
	</div>
</div>

<script>
	setTimeout(function() {
		window.location.href = "/";
	}, 2000);
</script>
{% endblock %}
